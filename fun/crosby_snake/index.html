<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Snake - Academic Survival</title>
    <link rel="stylesheet" href="../../css/cros_snake.css">
    <link rel="shortcut icon" href="../../assets/fav_dark.ico" type="image/x-icon">
</head>
<body>
    <header>Crosby Snake</header>
    <div id="game-container">
        <div id="game-header">
            <div id="score-display">Score: 0</div>
            <div id="gpa-display">GPA: 0.00</div>
        </div>
        <div id="game-board">
            <div id="overlay">
                <h2 id="win">Cant play lacrosse :(</h2>
                <p id="final-stats"></p>
                <button onclick="resetGame()">Retake Semester</button>
            </div>
        </div>
    </div>
    <div id="controls">
        Use <b>Arrow Keys</b> to steer. Each segment is a unique part of the set!
    </div>
    <script src="../../js/crosby.js"></script>
</body>
</html>
