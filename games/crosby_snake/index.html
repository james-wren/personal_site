<body>
    <nav>
        <div id="logo_div">
            <img src="/assets/images/logo.png" alt="James Wren">
        </div>
        <div id="main_nav_btns">
            <div class="nav_btn_div btn_div" id="projects_btn_div">
                <a class="nav_link" href="/projects/">Projects</a>
            </div>
            <div class="nav_btn_div btn_div" id="satire_btn_div">
                <a class="nav_link" href="/games/">Games</a>
            </div>
        </div>
        <div id="ui_btns_div">
            <div class="ui_btn_div btn_div">
                <a href="/util/search/" class="ui_btn"><img class="ui_svg" src="/assets/images/search.svg" alt="Search"></a>
            </div>
            <div class="ui_btn_div btn_div">
                <a href="/util/account/" class="ui_btn" style="border-right: none;"><img class="ui_svg" src="/assets/images/account.svg" alt="Account"></a>
            </div>

                <a href="/util/settings/" class="ui_btn"><img class="ui_svg" src="/assets/images/setting.svg" alt="Settings"></a>
            </div>
        </div>
    </nav>

    <header>
        <div id="header_box">
            <h1>Crosby Snake</h1>
            <h2>by James Wren</h2>
        </div>
    </header>
    <main>
        <div class="body_box" id="[placeholder]">
            <form>
                <button type="submit">Start</button>

                <label for="food">Number of food</label>
                <input type="number" name="food" id="food">

                <label for="size">Size of grid</label>
                <select name="size" id="size">
                    <option value="1">Small</option>
                    <option value="2">Medium</option>
                    <option value="3">Large</option>
                </select>

                <label for="speed">Snake speed</label>
                <select name="speed" id="speed">
                    <option value="1">Slow</option>
                    <option value="2">Normal</option>
                    <option value="3">Fast</option>
                </select>
            </form>
        </div>
    </main>
    <footer>
        <div id="foot_left">
            <p>This site collects no data from its users</p>

            <p>Contact Info: (407)-505-9131 or jameswren.dev@gmail.com</p>

        <div id="foot_right">
            <div id="social_links">
