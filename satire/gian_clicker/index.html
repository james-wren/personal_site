<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giancarlo Clicker</title>
    <link rel="stylesheet" href="../../css/gian_clicker.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>Gian Carlo Clicker</h1>
            <div class="stats">
                <p>Gian Points: <span id="score">0</span></p>
                <p>Gian Power: <span id="pps">0</span>/sec</p>
            </div>
        </header>

        <main>
            <div class="click-area">
                <div class="image-wrapper">
                    <img src="../../assets/games/gian_maid.JPG" id="clicker-image" alt="Gian Carlo">
                </div>
            </div>

            <div class="upgrades-container">
                <h2>Gian Store</h2>
                <div class="upgrade-list" id="upgrade-list">
                </div>
            </div>
        </main>

        <footer class="placeholder-section">
            <p>This website was made by Tag Tribble</p>
            <p>This website and all of its content are made and hosted with permission.</p>
        </footer>
    </div>
    <script src="../../js/gian_carlo.js"></script>
</body>
</html>
